; PlatformIO Project Configuration File
;
; Three separate firmwares live in this one project -- one per Arduino Mega:
;   arm1_feeder   -> src/arm1_feeder.cpp   (start point -> Conveyor 1)
;   arm2_sorter   -> src/arm2_sorter.cpp   (Conveyor 1 -> Red area / Conveyor 2)
;   arm3_inspect  -> src/arm3_inspect.cpp  (Conveyor 2 -> Green / Inspection + checking device)
;
; Build/upload one board:   pio run -e arm2_sorter -t upload
; Build all three:          pio run
;
; https://docs.platformio.org/page/projectconf.html

; ---- settings shared by every board ----
[env]
platform = atmelavr
board = megaatmega2560
framework = arduino

; USB serial (debug). HuskyLens runs on I2C, not this port.
monitor_speed = 115200

; Enlarge the hardware-serial RX buffer so replies from the Dobot Magician on
; Serial1 are not dropped. Must be a build flag (the Arduino core is compiled
; separately, so a #define in a sketch would be seen too late).
build_flags =
    -D SERIAL_RX_BUFFER_SIZE=256

; AI camera library (registry). The Dobot driver is the Lesson 3 SDK in
; lib/DobotSDK, wrapped by lib/DobotArm; the belt driver is lib/Conveyor.
lib_deps =
    huskylens/HuskyLens@^1.0.0

; ---- per-board environments: each compiles only its own sketch ----
[env:arm1_feeder]
build_src_filter = -<*> +<arm1_feeder.cpp>

[env:arm2_sorter]
build_src_filter = -<*> +<arm2_sorter.cpp>

[env:arm3_inspect]
build_src_filter = -<*> +<arm3_inspect.cpp>

[env:checker]
build_src_filter = -<*> +<checker.cpp>

; ---- calibration tools: hand-jog an arm and read X/Y/Z/R on the Serial Monitor.
;      Flash to the matching board, calibrate, then flash the real firmware back.
;      e.g.  pio run -e getpos_arm2 -t upload
[env:getpos_arm1]
build_src_filter = -<*> +<getpos_arm1.cpp>

[env:getpos_arm2]
build_src_filter = -<*> +<getpos_arm2.cpp>

[env:getpos_arm3]
build_src_filter = -<*> +<getpos_arm3.cpp>
